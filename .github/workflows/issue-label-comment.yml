name: Issue Label Comment Bot

on:
  issues:
    types: [labeled]

jobs:
  comment-on-label:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const labels = context.payload.issue.labels.map(label => label.name);
            
            let comment = '';
            
            if (labels.includes('completed')) {
              comment = 'This issue has been resolved. Thank you for your contribution!';
            } else if (labels.includes('enhancement')) {
              comment = 'Thanks for the enhancement suggestion! We appreciate your input.';
            }
            
            if (comment) {
              github.rest.issues.createComment({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                body: comment
              });
            }
